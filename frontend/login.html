<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NexGen Hospital</title>

<style>
body{
  background:#04080f;
  color:white;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.box{
  background:#0b1120;
  padding:30px;
  border-radius:12px;
  width:320px;
}
input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:1px solid #1e2d47;
  background:#111827;
  color:white;
}
button{
  width:100%;
  padding:12px;
  background:#00d4ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.role{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.role div{
  flex:1;
  padding:8px;
  text-align:center;
  border:1px solid #1e2d47;
  border-radius:8px;
  cursor:pointer;
}
.active{
  background:#00d4ff;
  color:black;
}
</style>
</head>

<body>

<form class="box" onsubmit="event.preventDefault(); doLogin();">
<h2>Login</h2>

<div class="role">
  <div class="role-tab" data-role="PATIENT" onclick="setRole('PATIENT',this)">Patient</div>
  <div class="role-tab" data-role="DOCTOR" onclick="setRole('DOCTOR',this)">Doctor</div>
  <div class="role-tab" data-role="ADMIN" onclick="setRole('ADMIN',this)">Admin</div>
</div>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="doLogin()">Login</button>

</div>

<script src="js/api.js"></script>

<script>
// ================= TOAST =================
function toast(msg){
  alert(msg); // simple for now
}

// ================= ROLE =================
let selectedRole = "PATIENT";

function setRole(role, el){
  selectedRole = role;

  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  // 🔥 save role from UI
  localStorage.setItem("login_role", role);
}

// ================= AUTO LOAD ROLE =================
const savedRole = localStorage.getItem("login_role");

if(savedRole){
  selectedRole = savedRole;

  const tab = document.querySelector(`.role-tab[data-role="${savedRole}"]`);
  if(tab) tab.classList.add("active");
}else{
  // default highlight
  document.querySelector(`.role-tab[data-role="PATIENT"]`).classList.add("active");
}

// ================= LOGIN =================
async function doLogin(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if(!username || !password){
    toast("Enter username & password");
    return;
  }

  try{
    const res = await API.login(username, password);

    // 🔥 FINAL ROLE LOGIC (FIXED)
    let role = localStorage.getItem("login_role");

    if(!role){
      role = res.role?.toUpperCase() || "PATIENT";
    }

    role = role.toLowerCase();

    // save role globally
    localStorage.setItem("nexgen_role", role);

    // ✅ redirect
    if(role === "admin") window.location.href = "admin.html";
    else if(role === "doctor") window.location.href = "doctor.html";
    else window.location.href = "patient.html";

  }catch(e){
    toast("Login failed");
  }
}

// ================= ENTER KEY =================
document.addEventListener("keydown", e=>{
  if(e.key==="Enter") doLogin();
});

// ================= AUTO REDIRECT =================
const token = localStorage.getItem("nexgen_token");
const role = localStorage.getItem("nexgen_role");

if(token && role){
  const r = role.toLowerCase();
  window.location.href =
    r === "admin" ? "admin.html" :
    r === "doctor" ? "doctor.html" :
    "patient.html";
}
</script>
</form>
</body>
</html>
